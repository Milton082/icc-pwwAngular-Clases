<section
  class="rounded-3xl border border-slate-200 bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 p-6 shadow-xl"
>
  <p class="text-xs font-bold uppercase tracking-[0.3em] text-indigo-300">
    {{ eyebrow() }}
  </p>

  <h3 class="mt-2 text-2xl font-black tracking-tight text-white">
    {{ title() }}
  </h3>

  <p class="mt-2 max-w-xl text-sm leading-relaxed text-slate-300">
    {{ description() }}
  </p>

  <button class="btn btn-sm mt-4 border-none bg-white text-slate-900 hover:bg-slate-200">
    {{ actionLabel() }}
  </button>
</section>
