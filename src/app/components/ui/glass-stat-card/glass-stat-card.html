<article
  class="rounded-2xl border border-slate-200 bg-gradient-to-br from-white to-slate-50 p-5 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-lg"
>
  <p class="text-xs font-semibold uppercase tracking-[0.22em] text-indigo-500">
    {{ label() }}
  </p>

  <p class="mt-3 text-3xl font-black tracking-tight text-slate-900">
    {{ value() }}
  </p>

  <p class="mt-2 text-xs text-slate-500">
    {{ helper() }}
  </p>
</article>
